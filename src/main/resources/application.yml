spring:
  application:
    name: rest-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost/rest_spring?useTimezone=true&serverTimezone=UTC
    username: root
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect:
      show-sql: false

logging:
  level:
    #root: WARN
    rest_springboot.rest_spring: DEBUG